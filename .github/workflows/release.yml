name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Compute SHA-256 checksum
        id: checksum
        run: |
          SUM=$(shasum -a 256 .build/Porty.dmg | awk '{print $1}')
          echo "sha256=$SUM" >> "$GITHUB_OUTPUT"
          echo "$SUM  Porty.dmg" > .build/Porty.dmg.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/Porty.dmg
            .build/Porty.dmg.sha256
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          append_body: |

            **SHA-256**: `${{ steps.checksum.outputs.sha256 }}`
