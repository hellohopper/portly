name: Release

# Tests run in .github/workflows/tests.yml (on every push/PR to main), not here.
# This workflow assumes the tagged commit has already passed there.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Compute SHA-256 checksum
        id: checksum
        run: |
          SUM=$(shasum -a 256 .build/Portly.dmg | awk '{print $1}')
          echo "sha256=$SUM" >> "$GITHUB_OUTPUT"
          echo "$SUM  Portly.dmg" > .build/Portly.dmg.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .build/Portly.dmg
            .build/Portly.dmg.sha256
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          append_body: |

            **SHA-256**: `${{ steps.checksum.outputs.sha256 }}`
