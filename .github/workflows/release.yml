name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: ./scripts/build-dmg.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/Porty.dmg
          generate_release_notes: true
          draft: ${{ github.event_name == 'workflow_dispatch' }}
